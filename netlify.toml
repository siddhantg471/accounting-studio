[build]
  publish = "."

# SPA Fallback: Redirect all 404s to index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Security Headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    # Netlify automatically applies ETag based caching which is optimal for unhashed assets.
    # We remove the hardcoded 1-year max-age to prevent returning users from getting stuck with old CSS/JS.
